version: "3.3"

services:
  base-cliente:
    image: builders/base-cliente:latest
    container_name: base-cliente
    logging:
      driver: json-file
    ports:
      - "9779:8080"
    environment:
      TZ: America/Sao_Paulo
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_PROFILES_ACTIVE: LOCAL-docker
      AUTH_BASIC_BUILDERS: $${docker-secret-auth-basic-builders}
    healthcheck:
      test: ps -ef | grep base-cliente.jar | grep -v grep | wc -l || exit 1
      interval: 1m30s
      timeout: 30s
      retries: 3
