version: "3.8"

services:
  db-backend:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-base_consulta_credito}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apppassword}
      TZ: America/Sao_Paulo
    ports:
      - "5434:5432"
    command: postgres -c listen_addresses='*'
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build:
      context: ..
      dockerfile: Dockerfile_local
    environment:
      TZ: America/Sao_Paulo
      JAVA_OPTS: "-Xms512m -Xmx512m"
      SPRING_PROFILES_ACTIVE: DEV
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://db-backend:5432/${DB_NAME:-base_consulta_credito}
      DB_USER: ${DB_USER:-appuser}
      DB_PASSWORD: ${DB_PASSWORD:-apppassword}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      API_KEY_NAME: ${API_KEY_NAME:-n8n-integration}
      API_KEY_VALUE: ${API_KEY_VALUE:-quickstart-api-key-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:3000}
    ports:
      - "8080:8080"
      - "5005:5005"
    depends_on:
      - db-backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend_postgres_data:
