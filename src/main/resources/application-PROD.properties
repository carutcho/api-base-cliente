# Application
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# Database - todas as variaveis sao obrigatorias em producao
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true

# Seed data - obrigatorio em producao
app.init.admin.username=${ADMIN_USERNAME}
app.init.admin.password=${ADMIN_PASSWORD}
app.init.api-key.value=${API_KEY_VALUE}
