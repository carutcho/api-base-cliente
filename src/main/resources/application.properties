# Jackson
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.deserialization.fail-on-ignored-properties=true

# Web
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# JPA
spring.jpa.open-in-view=false
Gostaria
# Exception messages
application.translation.properties.baseName=messages

# JWT - substitua JWT_SECRET por uma chave Base64 de 256 bits em producao
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS - origens separadas por virgula
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Seed data (criados na primeira execucao se nao existirem)
app.init.admin.username=${ADMIN_USERNAME:admin}
app.init.admin.password=${ADMIN_PASSWORD:admin123}
app.init.api-key.name=${API_KEY_NAME:n8n-integration}
app.init.api-key.value=${API_KEY_VALUE:quickstart-api-key-change-me}
